<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <title>DAS - Reset Password</title>
    <link href="{% static 'img/logo.png'%}" rel="icon" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css'%}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css'%}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/plugins/fontawesome/css/all.min.css'%}"
    />
    <link rel="stylesheet" href="{% static 'assets/css/style.css'%}" />
  </head>
  <body>
    <div class="main-wrapper login-body">
      <div class="login-wrapper">
        <div class="container">
          <div class="loginbox">
            <div class="login-left">
              <p style="text-align: left">LocahH-System</p>
            </div>
            <div class="login-right">
              <div class="login-right-wrap">
                <h1>Reset Password</h1>
                <p class="account-subtitle">Enter your new password</p>

                {% for message in messages %} {% if message.tags == 'error' %}
                <div
                  class="alert alert-warning alert-dismissible fade show"
                  role="alert"
                >
                  {{ message }}
                  <button
                    type="button"
                    class="close"
                    data-dismiss="alert"
                    aria-label="Close"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                {% elif message.tags == 'success' %}
                <div
                  class="alert alert-success alert-dismissible fade show"
                  role="alert"
                >
                  {{ message }}
                  <button
                    type="button"
                    class="close"
                    data-dismiss="alert"
                    aria-label="Close"
                  >
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                {% endif %} {% endfor %}

                <form method="POST" action="{% url 'password_reset' %}">
                  {% csrf_token %}
                  <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="new_password1">New Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="new_password1"
                      name="new_password1"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="new_password2">Confirm New Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="new_password2"
                      name="new_password2"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">
                      Reset Password
                    </button>
                  </div>
                </form>

                <div class="text-center dont-have">
                  Remember your password? <a href="{% url 'login' %}">Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{% static 'assets/js/jquery-3.6.0.min.js'%}"></script>
    <script src="{% static 'assets/js/popper.min.js'%}"></script>
    <script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js'%}"></script>
    <script src="{% static 'assets/js/script.js'%}"></script>
  </body>
</html>
